<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <script src="live2dcubismframework.js"></script>
    <script>
        // 最简单、最稳定的官方 Cubism3 初始化
        window.onload = function () {
            console.log("框架加载：", !!window.Live2DCubismFramework);
            
            try {
                const canvas = document.getElementById('live2d-canvas');
                canvas.width = 300;
                canvas.height = 300;

                // 初始化
                Live2DCubismFramework.start();
                
                // 加载模型（你的路径完全正确）
                Live2DCubismFramework.loadModel({
                    canvas: canvas,
                    model: './runtime/hiyori_pro_t11.model3.json'
                });

                console.log("✅ 模型启动成功！");
            } catch (e) {
                console.error("错误：", e);
            }
        };
    </script>
</body>
</html>
