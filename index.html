<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!-- 1. 先加载本地核心库（现在已经传上去啦！） -->
    <script src="./live2d/live2dcubismcore.min.js"></script>
    <!-- 2. 再加载官方框架库 -->
    <script src="https://cdn.jsdelivr.net/npm/live2dcubismframework@5.4.0/dist/live2dcubismframework.min.js"></script>
    
    <script>
    window.addEventListener('load', async () => {
      try {
        const Core = window.Live2DCubismCore;
        const Framework = window.Live2DCubismFramework;
    
        if (!Core || !Framework) {
          alert(" 核心库或框架库没加载成功！");
          return;
        }
    
        //  【关键修正】初始化是 Framework 的方法，不是 Core 的！
        Framework.initialize({
          core: Core, // 把底层核心传给框架
          logLevel: Framework.LogLevel.LogLevel_Info // 日志级别（可选）
        });
        Framework.startUp();
    
        // 你的模型路径（和文件夹完全匹配）
        const modelPath  = "./live2d/runtime/hiyori_pro_t11.model3.json";
        const motionPath = "./live2d/runtime/motion/hiyori_m01.motion3.json";
    
        // 创建画布
        const container = document.querySelector('.live2d-container');
        const canvas = document.createElement('canvas');
        canvas.style.width = "300px";
        canvas.style.height = "300px";
        container.appendChild(canvas);
        canvas.width = 300;
        canvas.height = 300;
    
        // 加载模型+动作+渲染
        const model = Framework.CubismModel.create();
        await model.loadModel(modelPath);
    
        const motion = Framework.CubismMotion.create();
        await motion.loadMotion(motionPath);
        model.startMotion(motion);
    
        const renderer = Framework.CubismRenderer.create(canvas);
        renderer.initialize();
        renderer.setModel(model);
    
        function loop() {
          model.update();
          renderer.render();
          requestAnimationFrame(loop);
        }
        loop();
    
        alert(" 终于成功啦！桃濑日和动起来了！");
      } catch (err) {
        console.error("错误详情：", err);
        alert(" 再看一眼控制台，我马上帮你搞定！");
      }
    });
    </script>

    

    </body>
    </html>
