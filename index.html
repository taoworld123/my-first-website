<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- 加载你本地的正版框架 -->
    <script src="./live2dcubismframework.js"></script>

    <script>
        // 页面加载完成后执行
        window.onload = async function () {
            try {
                console.log("✅ 框架加载成功！", LIVE2DCUBISMFRAMEWORK);
                
                // 1. 获取画布
                const canvas = document.getElementById('live2d-canvas');
                canvas.width = 350;
                canvas.height = 350;

                // 2. 模型路径（完全匹配你的仓库）
                const modelJson = './runtime/hiyori_pro_t11.model3.json';

                // 3. 极简初始化（适配你的框架）
                const model = await LIVE2DCUBISMFRAMEWORK.Model.load(modelJson);
                const renderer = new LIVE2DCUBISMFRAMEWORK.Renderer(canvas);
                renderer.setModel(model);

                // 4. 主循环（渲染+更新）
                function tick() {
                    model.update();
                    renderer.render();
                    requestAnimationFrame(tick);
                }
                tick();

                console.log("🎉 桃濑日和模型运行成功！");
            } catch (err) {
                console.error("❌ 错误：", err);
            }
        };
    </script>
</body>
</html>
