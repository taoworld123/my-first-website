<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!-- 加载 Live2D-->
    <script src="./live2d/index-C3Nm6OPZ.js"></script>
    <script>
    window.Live2DCubismCore = window.Live2DCubism;
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
    // 等待核心库挂载到全局（解决"找不到变量"问题）
    while (!window.Live2DCubism || !window.Live2DCubismFramework) {
        await new Promise(resolve => setTimeout(resolve, 10));
    }

    const Live2DCubism = window.Live2DCubism;
    const Live2DCubismFramework = window.Live2DCubismFramework;

    // 初始化核心库（官方标准步骤）
    Live2DCubism.initialize();
    Live2DCubismFramework.startUp();

    //  你的画布代码完全保留原样
    const modelUrl = "./live2d/hiyori_pro_t11.cmo3";
    const motionUrl = "./live2d/hiyori_pro_t04.can3";
    const app = document.querySelector('.live2d-container');
    const canvas = document.createElement('canvas');
    canvas.style.width = '300px';
    canvas.style.height = '300px';
    app.appendChild(canvas);
    canvas.width = 300;
    canvas.height = 300;

    // 加载模型（异步方式，避免白屏）
    const model = Live2DCubismFramework.CubismModel.create();
    await model.loadModel(modelUrl);

    // 加载并播放动作
    const motion = Live2DCubismFramework.CubismMotion.create();
    await motion.loadMotion(motionUrl);
    model.startMotion(motion);

    // 初始化渲染器
    const renderer = Live2DCubismFramework.CubismRenderer.create(canvas);
    renderer.initialize();
    renderer.setModel(model);

    // 渲染循环（让模型持续动起来）
    function tick() {
        model.update();
        renderer.render();
        requestAnimationFrame(tick);
    }
    tick();
    });
    </script>
    </body>
    </html>
