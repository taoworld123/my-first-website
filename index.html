<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Github Website</title>
    <style>
        * {
          margin: 0;
          padding: 0;   
          box-sizing: border-box;
        }
        html {
            height: 100%;
        }
        body {
            min-height: 100vh;
            background-attachment: fixed;
            background: #000000;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 1.25rem;
            box-sizing: border-box;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .avatar {
            width:  9.375rem;
            height: 9.375rem;
            border-radius: 50%;
            object-fit: cover;
            margin: 1.25rem auto; 
            display: block;
        }
        .name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0066cc;
            margin: 0.625rem 0;
        }
         h1 {
            font-size: 2rem;
            margin: 1rem 0;
            color: #22c55e;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0.5rem 0;
            color: #86efac;
        }
        .link {
            font-size: 1.25rem;
            margin: 0.625rem 1rem;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
         iframe {
            position: fixed;
            left: 1rem; 
            bottom: 0.625rem;
            width: 90vw;
            max-width: 20rem;
            aspect-ratio: 20 / 22.5;
            border: none;
            background: transparent;
            overflow: hidden;
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="avatar" src="profile%20picture%20(1).webp" alt="My Avatar">
        <div class="name">taoworld123</div>
        <h1>Hello Github!</h1>
        <p>This is my first website hosted on Github.</p>
        <p>I will gradually improve this page in my spare time.</p>
        <br>
        <a class="link" href="music.html">Music</a>
        <a class="link" href="game.html">Game</a>
        <a class="link" href="book.html">Book</a>
        <a class="link" href="anime.html">Anime</a>
   </div>
  <iframe 
        src="https://47.239.23.53:5000/" 
        frameborder="0"
        scrolling="no"
        allowtransparency="true">
  </iframe>
</body>
</html>
