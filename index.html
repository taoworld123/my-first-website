<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- ✅ 正确引入你上传的 Cubism3 官方内核（根目录） -->
    <script src="./live2dcubismframework.js"></script>

    <script>
        // 页面加载完成后初始化Live2D
        window.addEventListener('load', function () {
            try {
                console.log("✅ Live2D框架加载成功");

                // 1. 获取画布元素
                const canvas = document.getElementById('live2d-canvas');
                // 2. 模型路径（✅ 完全匹配你的仓库结构）
                const modelPath = './runtime/hiyori_pro_t11.model3.json';

                // 3. 初始化Cubism3框架
                Live2DCubismFramework.CubismWebFramework.initialize();

                // 4. 创建模型查看器（官方最简稳定方式）
                const viewer = new Live2DCubismFramework.CubismViewer({
                    canvas: canvas,
                    modelPath: modelPath,
                    viewMatrix: new Live2DCubismFramework.CubismViewMatrix(),
                    sceneMatrix: new Live2DCubismFramework.CubismMatrix44()
                });

                // 5. 加载模型并运行
                viewer.loadAssets()
                    .then(() => {
                        viewer.start();
                        console.log("🎉 桃濑日和模型加载成功！");
                    })
                    .catch((error) => {
                        console.error("❌ 模型加载失败：", error);
                        alert("模型加载失败，请打开控制台查看错误");
                    });

            } catch (e) {
                console.error("❌ 初始化失败：", e);
                alert("Live2D初始化失败：" + e.message);
            }
        });
    </script>

    </body>
    </html>
