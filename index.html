<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!--  第一步：先引入你本地的官方核心库（绝对不会加载失败） -->
    <script src="./live2d/live2dcubismcore.min.js"></script>
    <!--  第二步：再引入官方框架库（用 CDN 或你本地的都行，这里先用 CDN 测试） -->
    <script defer src="https://cdn.jsdelivr.net/npm/live2dcubismframework@5.4.0/dist/live2dcubismframework.min.js"></script>
    
    <script>
    // 等页面+所有脚本都加载完再执行
    window.addEventListener('load', async () => {
      // 从 window 上取核心库（本地库加载后一定存在）
      const Core = window.Live2DCubismCore;
      const Framework = window.Live2DCubismFramework;
    
      // 先检查核心库是否加载成功
      if (!Core) {
        alert(" 本地核心库没加载成功！检查路径：./live2d/live2dcubismcore.min.js");
        return;
      }
      if (!Framework) {
        alert(" 框架库没加载成功！稍后我教你下载到本地");
        return;
      }
    
      Core.initialize();
      Framework.startUp();
    
      //  只用 runtime 里的标准文件
      const modelPath  = "./live2d/runtime/hiyori_pro_t11.model3.json";
      const motionPath = "./live2d/runtime/motion/hiyori_m01.motion3.json";
    
      const container = document.querySelector('.live2d-container');
      const canvas = document.createElement('canvas');
      canvas.style.width = "300px";
      canvas.style.height = "300px";
      container.appendChild(canvas);
    
      try {
        // 加载模型
        const model = Framework.CubismModel.create();
        await model.loadModel(modelPath);
    
        // 加载动作
        const motion = Framework.CubismMotion.create();
        await motion.loadMotion(motionPath);
        model.startMotion(motion);
    
        // 渲染
        const renderer = Framework.CubismRenderer.create(canvas);
        renderer.initialize();
        renderer.setModel(model);
    
        function loop() {
          model.update();
          renderer.render();
          requestAnimationFrame(loop);
        }
        loop();
    
        alert(" 模型跑起来啦！");
      } catch (e) {
        console.error("错误详情：", e);
        alert(" 看下控制台错误信息");
      }
    });
    </script>


    </body>
    </html>
