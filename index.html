<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!-- 加载 Live2D-->
    <script src="./live2d/runtime/cubismcore.min.js"></script>
    <script src="./live2d/runtime/live2dcubismframework.min.js"></script>
    <script>
    const modelUrl = "./live2d/hiyori_pro_t11.cmo3";
    const motionUrl = "./live2d/hiyori_pro_t04.can3";
    const app = document.querySelector('.live2d-container');
    const canvas = document.createElement('canvas');
    canvas.style.width = '300px';
    canvas.style.height = '300px';
    app.appendChild(canvas);
    canvas.width = 300;
    canvas.height = 300;
    // 1. 初始化Live2D核心库
    Live2DCubismCore.initialize();
    
    // 2. 创建模型实例并加载你的模型
    const model = Live2DCubismFramework.CubismModel.create();
    model.loadModel(modelUrl);
    
    // 3. 创建动作实例并加载你的动作，让模型开始动
    const motion = Live2DCubismFramework.CubismMotion.create();
    motion.loadMotion(motionUrl);
    model.startMotion(motion);
    
    // 4. 创建渲染器，把模型画到画布上
    const renderer = Live2DCubismFramework.CubismRenderer.create(canvas);
    renderer.initialize();
    renderer.setModel(model);
    
    // 5. 加一个新的循环，让模型每帧更新+渲染（这是小人能显示、能动的关键）
    function tick() {
        model.update();      // 更新模型状态（眨眼、动作等）
        renderer.render();   // 把模型画到网页上
        requestAnimationFrame(tick);
    }
    tick();

    function loop() {
        requestAnimationFrame(loop);
    }
    loop();
    </script>


</body>

</html>
