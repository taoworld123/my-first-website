<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
   <!-- 修复：正确的Live2D容器（标签错误已修正） -->
    <div class="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- 引入Cubism3内核 -->
    <script src="./live2dcubismframework.js"></script>

    <script>
        // 等待页面+脚本完全加载完毕再执行（解决未定义报错）
        window.onload = function() {
            // 双重检查：框架是否真的加载成功
            if (!window.Live2DCubismFramework) {
                console.error("❌ Cubism3框架加载失败！");
                alert("Live2D框架加载失败，请检查文件");
                return;
            }

            try {
                console.log("✅ Live2D框架加载成功！");
                const canvas = document.getElementById('live2d-canvas');
                const modelPath = './runtime/hiyori_pro_t11.model3.json';

                // 初始化框架
                Live2DCubismFramework.CubismWebFramework.initialize();

                // 创建模型
                const viewer = new Live2DCubismFramework.CubismViewer({
                    canvas: canvas,
                    modelPath: modelPath,
                    viewMatrix: new Live2DCubismFramework.CubismViewMatrix(),
                    sceneMatrix: new Live2DCubismFramework.CubismMatrix44()
                });

                // 加载并启动
                viewer.loadAssets().then(() => {
                    viewer.start();
                    console.log("🎉 模型运行成功！");
                }).catch(err => {
                    console.error("模型加载失败：", err);
                });

            } catch (err) {
                console.error("初始化错误：", err);
            }
        };
    </script>
</body>
</html>
