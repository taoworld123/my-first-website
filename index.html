<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!-- 引入 PixiJS（渲染引擎） -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.8.0/dist/browser/pixi.min.js"></script>
    <!-- 引入 Live2D Cubism 4 封装（自动关联你本地核心库） -->
    <script src="https://cdn.jsdelivr.net/npm/@pixi/live2d-display@latest/dist/cubism4.min.js"></script>
    <!-- 引入 pixi-live2d-display（核心封装库） -->
    <script src="https://cdn.jsdelivr.net/npm/@pixi/live2d-display@latest/dist/pixi-live2d-display.min.js"></script>
    
    <script>
    window.addEventListener('load', async () => {
      try {
        // 1. 创建渲染容器（和你页面的 .live2d-container 绑定）
        const app = new PIXI.Application({
          view: document.querySelector('.live2d-container'),
          autoStart: true,
          transparent: true, // 背景透明
          width: 300,
          height: 300
        });
    
        // 2. 直接加载你的模型（用 runtime 里的 .model3.json，完全适配你的文件夹！）
        const model = await PIXI.live2d.loadModel('./live2d/runtime/hiyori_pro_t11.model3.json');
        app.stage.addChild(model);
    
        // 3. 调整模型大小和位置（让它显示在画布中间）
        model.scale.set(0.5); // 缩小一点，避免太大
        model.anchor.set(0.5); // 锚点居中
        model.x = app.screen.width / 2;
        model.y = app.screen.height / 2;
    
        // 4. 播放动作（选一个你喜欢的动作）
        const motion = await model.loadMotion('./live2d/runtime/motion/hiyori_m01.motion3.json');
        motion.play(); // 自动播放
    
        alert(" 成功！桃濑日和终于在你页面上动起来啦！");
      } catch (err) {
        console.error(" 错误详情：", err);
        alert(" 看控制台打印的错误，我马上帮你搞定！");
      }
    });
    </script>


    </body>
    </html>
