<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>My First Github Website</title>
    <style>
        .live2d-container {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 999;
        }
        body {
            text-align: center;
            font-family: Arial,sans-serif;
            margin: 0;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            margin: 10px 0;
        }
        .link {
            font-size: 20px;
            margin: 0 20px;
            text-decoration: none;
            color: #28a745;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .link:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <img class="avatar" src="profile%20picture.jpeg" alt="My Avatar">
    <div class="name">taoworld123</div>
    <h1 style="text-align: center;">Hello Github!</h1>
    <p style="text-align: center;">This is my first website hosted on Github.</p>
    <p style="text-align: center;">I want to start a wonderful trip right now</p>
    <br>
    <a class="link" href="music.html">Music</a>
    <a class="link" href="game.html">Game</a>
    <a class="link" href="book.html">Book</a>
    <a class="link" href="anime.html">Anime</a>
    <div class="live2d-container"></div>
    <!-- 1. 先加载你本地的官方核心库（已经传上去了！） -->
    <script src="./live2d/live2dcubismcore.min.js"></script>
    <!-- 2. 再加载你自己编译的框架库（就是这个 index-C3Nm6OPZ.js！） -->
    <script src="./live2d/index-C3Nm6OPZ.js"></script>
    
    <script>
    window.addEventListener('load', async () => {
      // 先打印日志，精准定位哪个库没加载
      console.log(" 核心库：", window.Live2DCubismCore);
      console.log(" 框架库：", window.Live2DCubismFramework);
    
      const Core = window.Live2DCubismCore;
      const Framework = window.Live2DCubismFramework;
    
      // 精准提示问题
      if (!Core) {
        alert(" 核心库没找到！检查 live2d/ 里有没有 live2dcubismcore.min.js");
        return;
      }
      if (!Framework) {
        alert(" 框架库没找到！检查 live2d/ 里有没有 index-C3Nm6OPZ.js");
        return;
      }
    
      try {
        //  正确初始化（你自己的框架库也用这个方法！）
        Framework.initialize({
          core: Core, // 把核心库传给框架
          logLevel: Framework.LogLevel.LogLevel_Info
        });
        Framework.startUp();
    
        //  你的模型路径（和文件夹完全匹配）
        const modelPath  = "./live2d/runtime/hiyori_pro_t11.model3.json";
        const motionPath = "./live2d/runtime/motion/hiyori_m01.motion3.json";
    
        // 创建画布
        const container = document.querySelector('.live2d-container');
        const canvas = document.createElement('canvas');
        canvas.style.width = "300px";
        canvas.style.height = "300px";
        container.appendChild(canvas);
        canvas.width = 300;
        canvas.height = 300;
    
        // 加载模型+动作+渲染
        const model = Framework.CubismModel.create();
        await model.loadModel(modelPath);
    
        const motion = Framework.CubismMotion.create();
        await motion.loadMotion(motionPath);
        model.startMotion(motion);
    
        const renderer = Framework.CubismRenderer.create(canvas);
        renderer.initialize();
        renderer.setModel(model);
    
        function loop() {
          model.update();
          renderer.render();
          requestAnimationFrame(loop);
        }
        loop();
    
        alert(" 终于成功！桃濑日和在你页面上动起来了！");
      } catch (err) {
        console.error(" 错误详情：", err);
        alert(" 看控制台打印的错误：" + err.message);
      }
    });
    </script>



    </body>
    </html>
